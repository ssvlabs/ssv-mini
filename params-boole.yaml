# Boole fork test: starts at Electra, forks into Boole at epoch 3, Fulu at epoch 5
# Usage: make run PARAMS_FILE=params-boole.yaml

network:
  participants:
  - el_type: geth
    el_image: ethereum/client-go:v1.16.7
    cl_type: lighthouse
    cl_image: sigp/lighthouse:v8.0.1
    validator_count: 32
    count: 2
    supernode: true

  additional_services:
    - dora

  network_params:
    network_id: "3151908"
    deneb_fork_epoch: 0
    electra_fork_epoch: 0
    fulu_fork_epoch: 5
    perfect_peerdas_enabled: false
    preregistered_validator_count: 74

  port_publisher:
    cl:
      enabled: true

use_static_keys: true

monitor:
  enabled: false

boole_epoch: 3

nodes:
  ssv:
    count: 4
  anchor:
    count: 0

images:
  ssv: "node/ssv"
  anchor: "sigp/anchor:v1.2.0"
  monitor: "monitor"
  redis: "redis:7.4.2"
  postgres: "postgres:15"
  foundry: "localssv/ssv-network"
